<div class="page">
    <div class="container">
        <div class="content">
            <h1>Login</h1>
            <p>Login to your account to access all the features of our application.</p>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
                <!-- <div class="form-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        formControlName="name"
                        class="form-input"
                        placeholder="Enter your full name"
                    />
                    <span class="error-message" *ngIf="loginForm.get('name')?.hasError('required') && loginForm.get('name')?.touched">
                        Full name is required
                    </span>
                    <span class="error-message" *ngIf="loginForm.get('name')?.hasError('minlength') && loginForm.get('name')?.touched">
                        Full name must be at least 2 characters
                    </span>
                </div> -->

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        formControlName="email"
                        class="form-input"
                        placeholder="Enter your email"
                    />
                    <span class="error-message" *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched">
                        Email is required
                    </span>
                    <span class="error-message" *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched">
                        Please enter a valid email
                    </span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        formControlName="password"
                        class="form-input"
                        placeholder="Enter your password"
                    />
                    <span class="error-message" *ngIf="loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched">
                        Password is required
                    </span>
                    <span class="error-message" *ngIf="loginForm.get('password')?.hasError('minlength') && loginForm.get('password')?.touched">
                        Password must be at least 6 characters
                    </span>
                </div>

                <button type="submit" class="login-btn" [disabled]="loginForm.invalid">
                    Login
                </button>
            </form>
            <div class="alternate-action">
                <span>Don't have an account?</span>
                <button type="button" class="signup-link" routerLink="/signup">Sign Up</button>
            </div>
        </div>
    </div>
</div>
